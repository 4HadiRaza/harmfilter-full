<style>
        @keyframes pulse-glow {
            0% { transform: scale(1); opacity: 0.8; filter: drop-shadow(0 0 10px rgba(232, 0, 29, 0.4)); }
            50% { transform: scale(1.05); opacity: 1; filter: drop-shadow(0 0 30px rgba(232, 0, 29, 0.7)); }
            100% { transform: scale(1); opacity: 0.8; filter: drop-shadow(0 0 10px rgba(232, 0, 29, 0.4)); }
        }
        .animate-pulse-glow {
            animation: pulse-glow 3s ease-in-out infinite;
        }
        .terminal-cursor::after {
            content: '_';
            animation: blink 1s step-end infinite;
        }
        @keyframes blink {
            from, to { opacity: 1; }
            50% { opacity: 0; }
        }
        .bg-pitch-black { background-color: #090909; }
        .text-crimson-brand { color: #E8001D; }
    </style>
