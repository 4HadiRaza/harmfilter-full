<div class="relative mb-8">
<div class="w-24 h-24 rounded-full border-2 border-[#E8001D] flex items-center justify-center bg-[#E8001D]/10">
<span class="material-symbols-outlined text-[#E8001D] text-4xl" style="font-variation-settings: 'wght' 600;">refresh</span>
</div>
<!-- Decorative Glow -->
<div class="absolute inset-0 bg-[#E8001D]/20 blur-2xl rounded-full -z-10"></div>
</div>
<!-- Headline & Results -->
<div class="text-center space-y-2 mb-12">
<h1 class="font-syne font-extrabold text-[30px] leading-tight text-[#F5F5F5]">Keep Practicing!</h1>
<div class="flex flex-col items-center">
<span class="font-syne font-extrabold text-[48px] text-[#F5F5F5]">4 / 10</span>
<!-- Custom Score Bar -->
<div class="w-64 h-2 bg-[#1F1F1F] mt-4 overflow-hidden">
<div class="h-full bg-[#E8001D] w-[40%]"></div>
</div>
</div>
</div>
<!-- Points Banner -->
<div class="w-full max-w-md bg-[#161616] border-l-4 border-[#E8001D] p-6 mb-12 flex items-start gap-4">
<span class="material-symbols-outlined text-[#E8001D]" data-weight="fill" style="font-variation-settings: 'FILL' 1;">error</span>
<p class="font-mono text-sm leading-relaxed text-[#8A8A8A]">

            </p>

                TRY AGAIN
            </button>
