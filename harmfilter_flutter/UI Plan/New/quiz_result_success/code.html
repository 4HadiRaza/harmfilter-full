                    "borderRadius": {
                        "DEFAULT": "0.25rem",

                        "full": "9999px"

                    "spacing": {
                        "gutter": "12px",
                        "element-gap": "12px",
                        "section-margin": "32px",
                        "grid-columns": "12",
                        "container-padding": "16px"
                    },
                    "fontFamily": {
                        "hero-num": ["Epilogue"],
                        "body-reading": ["Newsreader"],
                        "section-header": ["Space Grotesk"],
                        "micro-label": ["Space Grotesk"],
                        "ui-label": ["Space Grotesk"],
                        "title-lg": ["Epilogue"]
                    },
                    "fontSize": {
                        "hero-num": ["64px", {"lineHeight": "1.1", "letterSpacing": "-0.04em", "fontWeight": "800"}],
                        "body-reading": ["17px", {"lineHeight": "1.6", "fontWeight": "400"}],
                        "section-header": ["14px", {"lineHeight": "1.0", "letterSpacing": "2px", "fontWeight": "700"}],

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .green-glow {
            box-shadow: 0 0 30px rgba(34, 197, 94, 0.2);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-[#090909] text-[#F5F5F5] min-h-screen flex flex-col font-['Space_Grotesk'] overflow-hidden">
<!-- Top AppBar (from JSON) -->
<header class="bg-[#090909] text-[#E8001D] flex justify-between items-center w-full px-4 h-16 border-b-[1px] border-[#2A2A2A] docked full-width top-0 border-b flat-no-shadows z-50">
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-[#8A8A8A]">menu</span>
<span class="font-['Syne'] font-bold text-xl tracking-tighter text-[#F5F5F5]">HarmFilter</span>
</div>
<div class="font-['Space_Mono'] uppercase tracking-widest text-sm">
            LEARN
        </div>
<div class="w-8 h-8 rounded-full overflow-hidden border border-[#2A2A2A]">
<img alt="User profile avatar" class="w-full h-full object-cover" data-alt="Close-up portrait of a professional young man with a neutral expression, modern haircut, and soft studio lighting" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDdzDnRiMRu9Jd9Iu74-XtwDJfgD4SLDBKiQ89hGuLItZsG3QN5wtGnkTKvfOyBN3BH-Rjm-bMof85yhkds1sdYyqba_o-gwwDRRqTJCTFz9tzszMAXgQ-iX7H9PyVMwqg1wJbrUOwdshBiNFapnInn1v2f2RB4dJxQrwmrkY9KnOeeqZOH77CMH0VMb7LEceldeUg3dBg4m5awHMvwz4f-7ni8K_qmqe7dFe3Jtd9QrEY0_H2MXNXOIq2_elklg5AtHnJLqqOBRE4"/>
</div>
</header>
<!-- Main Content Canvas -->
<main class="flex-grow flex flex-col items-center justify-center px-6 relative">
<!-- Status Label -->
<span class="font-['Space_Mono'] text-[#8A8A8A] uppercase tracking-[0.2em] mb-8 text-[12px]">Assessment Complete</span>
<!-- Animated Success Circle -->
<div class="relative w-[120px] h-[120px] flex items-center justify-center mb-6">
<!-- Background Glow -->
<div class="absolute inset-0 rounded-full bg-green-500/10 blur-xl"></div>
<!-- Main Circle -->
<div class="w-full h-full rounded-full border-2 border-green-500 flex items-center justify-center green-glow">
<span class="material-symbols-outlined text-green-500 !text-5xl" data-weight="fill" style="font-variation-settings: 'FILL' 1;">trophy</span>
</div>
</div>
<!-- Headline -->
<h1 class="font-['Syne'] font-extrabold text-[30px] text-[#F5F5F5] mb-2">Perfect Score!</h1>
<!-- Score Ratio -->
<div class="font-['Syne'] font-extrabold text-[48px] text-green-500 mb-8 leading-none">8 / 10</div>
<!-- Score Bar -->
<div class="w-full max-w-xs h-2 bg-[#1C1C1C] mb-12 overflow-hidden">
<div class="h-full bg-green-500 w-[80%]"></div>
</div>
<!-- Points Banner -->
<div class="w-full max-w-sm bg-[#161616] border-l-4 border-green-500 py-4 px-6 flex items-center gap-4 mb-16">
<span class="material-symbols-outlined text-green-500">bolt</span>
<span class="font-['Space_Grotesk'] font-medium text-[#F5F5F5]">You earned +50 points!</span>
</div>
<!-- Buttons Section -->
<div class="flex gap-4 w-full max-w-sm">
<button class="flex-1 py-4 border border-[#E8001D] text-[#E8001D] font-['Space_Grotesk'] font-bold text-sm tracking-widest uppercase hover:bg-[#E8001D]/5 transition-all active:scale-95">
                RETRY
            </button>
<button class="flex-1 py-4 bg-[#E8001D] text-[#F5F5F5] font-['Space_Grotesk'] font-bold text-sm tracking-widest uppercase hover:brightness-110 transition-all active:scale-95 shadow-[0px_0px_20px_rgba(232,0,29,0.2)]">
                BACK TO LEARN
            </button>
</div>
</main>
<!-- Bottom Navigation Bar (from JSON) -->
<nav class="fixed bottom-6 left-0 right-0 z-50 flex justify-around items-center px-4 py-2 bg-[#161616]/90 backdrop-blur-md fixed bottom-6 left-1/2 -translate-x-1/2 w-[90%] max-w-md rounded-full border border-[#2A2A2A] shadow-[0px_4px_20px_rgba(232,0,29,0.15)]">
<div class="text-[#8A8A8A] p-3 hover:text-[#F5F5F5] transition-all duration-200 Active: scale-90 duration-150 cursor-pointer">
<span class="material-symbols-outlined">grid_view</span>
</div>
<div class="text-[#E8001D] bg-[#E8001D]/10 rounded-full p-3 hover:text-[#F5F5F5] transition-all duration-200 Active: scale-90 duration-150 cursor-pointer">
<span class="material-symbols-outlined">school</span>
</div>
<div class="text-[#8A8A8A] p-3 hover:text-[#F5F5F5] transition-all duration-200 Active: scale-90 duration-150 cursor-pointer">
<span class="material-symbols-outlined">shield</span>
</div>
<div class="text-[#8A8A8A] p-3 hover:text-[#F5F5F5] transition-all duration-200 Active: scale-90 duration-150 cursor-pointer">
<span class="material-symbols-outlined">settings</span>
</div>
</nav>
<!-- Background Decoration -->
<div class="fixed top-0 left-0 w-full h-full pointer-events-none opacity-20 -z-10">
<div class="absolute top-[20%] right-[-10%] w-[400px] h-[400px] bg-[#E8001D]/10 rounded-full blur-[100px]"></div>
<div class="absolute bottom-[-10%] left-[-5%] w-[300px] h-[300px] bg-green-500/5 rounded-full blur-[100px]"></div>
</div>
